<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalunia CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{dark:"#0a0e1a",card:"#111827",border:"#1e293b",neon:"#00f0ff",neonPink:"#ff00e5",neonGreen:"#00ff88",neonYellow:"#ffe600",neonOrange:"#ff6b00"}}}}</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap');
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0e1a;color:#e2e8f0;overflow-x:hidden}
.font-gaming{font-family:'Orbitron',monospace}
.fade{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-neon{0%,100%{box-shadow:0 0 5px #00f0ff,0 0 20px #00f0ff30}50%{box-shadow:0 0 15px #00f0ff,0 0 50px #00f0ff50}}
@keyframes glow{0%,100%{text-shadow:0 0 10px #00f0ff80}50%{text-shadow:0 0 20px #00f0ff,0 0 40px #00f0ffaa}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
@keyframes levelup{0%{transform:scale(0.5);opacity:0}30%{transform:scale(1.4);opacity:1}60%{transform:scale(0.9);opacity:1}100%{transform:scale(1);opacity:0}}
@keyframes xpfill{from{width:0}to{width:var(--xp-pct)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,-2px)}80%{transform:translate(1px,1px)}}
@keyframes glitchText{0%,100%{text-shadow:2px 0 #ff00e5,-2px 0 #00f0ff}25%{text-shadow:-2px -1px #ff00e5,2px 1px #00f0ff}50%{text-shadow:1px 2px #ff00e5,-1px -2px #00f0ff}75%{text-shadow:-1px 1px #ff00e5,1px -1px #00f0ff}}
@keyframes rgbBorder{0%{border-color:#00f0ff60}33%{border-color:#ff00e560}66%{border-color:#00ff8860}100%{border-color:#00f0ff60}}
@keyframes scanline{0%{top:-100%}100%{top:100%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes badgePop{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes toastSlide{0%{transform:translateX(120%);opacity:0}10%{transform:translateX(0);opacity:1}90%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes matrixFall{0%{transform:translateY(-100%);opacity:1}100%{transform:translateY(100vh);opacity:0}}
@keyframes energyPulse{0%,100%{opacity:.6;filter:blur(8px)}50%{opacity:1;filter:blur(12px)}}
.neon-glow{animation:pulse-neon 2s infinite}
.neon-text{animation:glow 2s infinite}
.glitch-text{animation:glitchText 3s infinite;font-family:'Orbitron',monospace}
.card-dark{background:#111827;border:1px solid #1e293b;border-radius:16px;position:relative;transition:all .3s ease}
.card-dark:hover{border-color:#00f0ff40;box-shadow:0 0 30px #00f0ff15,inset 0 0 30px #00f0ff05}
.card-dark.epic{animation:rgbBorder 3s linear infinite}
.card-dark.epic:hover{box-shadow:0 0 40px #00f0ff20,0 0 80px #ff00e510}
.xp-bar{height:10px;border-radius:5px;background:#1e293b;overflow:hidden;position:relative}
.xp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#00f0ff,#a855f7,#00ff88);background-size:200% 100%;animation:xpfill 1.2s ease-out,shiftGradient 3s ease infinite;width:var(--xp-pct)}
@keyframes shiftGradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.xp-bar::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:xpShine 2s ease-in-out infinite}
@keyframes xpShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;font-size:11px;font-weight:700;animation:badgePop .5s ease-out backwards;border:1px solid}
.toast-container{position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;border-radius:12px;background:#111827;border:1px solid #1e293b;animation:toastSlide 4s ease-in-out forwards;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.matrix-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.03}
.scanline{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00f0ff40,transparent);z-index:9998;pointer-events:none;animation:scanline 8s linear infinite;opacity:.3}
.stat-number{animation:countUp .6s ease-out backwards;font-variant-numeric:tabular-nums}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;font-size:14px;font-weight:900;border:2px solid;text-shadow:0 0 10px currentColor}
.energy-orb{position:absolute;border-radius:50%;animation:energyPulse 3s ease-in-out infinite;pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0e1a}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#00f0ff40}
input,select,textarea{background:#1a2332!important;border-color:#1e293b!important;color:#e2e8f0!important}
input:focus,select:focus,textarea:focus{border-color:#00f0ff!important;box-shadow:0 0 0 2px #00f0ff30!important}
</style>
</head>
<body>
<div id="root"></div>
<script>
const h=React.createElement;
const{useState,useEffect,useMemo,useCallback,useRef}=React;

const STATUSES=[
{id:"new",label:"A traiter",emoji:"🆕",color:"#00f0ff",bg:"#00f0ff15"},
{id:"email_sent",label:"Email envoye",emoji:"📤",color:"#a855f7",bg:"#a855f715"},
{id:"linkedin",label:"LinkedIn envoye",emoji:"🔗",color:"#06B6D4",bg:"#06B6D415"},
{id:"both_sent",label:"Les deux envoyes",emoji:"📧",color:"#818cf8",bg:"#818cf815"},
{id:"replied",label:"Reponse recue",emoji:"🔥",color:"#ffe600",bg:"#ffe60015"},
{id:"meeting",label:"RDV planifie",emoji:"📅",color:"#00ff88",bg:"#00ff8815"},
{id:"converted",label:"DEAL CLOSE",emoji:"🏆",color:"#00ff88",bg:"#00ff8820"},
{id:"not_interested",label:"Pas interesse",emoji:"❌",color:"#ef4444",bg:"#ef444415"},
{id:"follow_up",label:"A recontacter",emoji:"💤",color:"#64748b",bg:"#64748b15"},
{id:"unsubscribed",label:"Desabonne",emoji:"🚫",color:"#64748b",bg:"#64748b15"},
{id:"bounced",label:"Bounced",emoji:"💥",color:"#ef4444",bg:"#ef444415"},
];

// XP System
const LEVELS=[
{level:1,name:"Debutant",min:0,color:"#64748b"},
{level:2,name:"Prospecteur",min:100,color:"#00f0ff"},
{level:3,name:"Chasseur",min:500,color:"#a855f7"},
{level:4,name:"Expert",min:2000,color:"#ffe600"},
{level:5,name:"Closer",min:5000,color:"#00ff88"},
{level:6,name:"Legende",min:10000,color:"#ff00e5"},
];
function getLevel(xp){for(let i=LEVELS.length-1;i>=0;i--)if(xp>=LEVELS[i].min)return LEVELS[i];return LEVELS[0];}
function getXpPct(xp){const lv=getLevel(xp);const i=LEVELS.indexOf(lv);const next=LEVELS[i+1];if(!next)return 100;return Math.round((xp-lv.min)/(next.min-lv.min)*100);}
function calcXP(stats){if(!stats)return 0;return(stats.contacted||0)*5+(stats.replied||0)*25+(stats.meetings||0)*100+(stats.converted||0)*500;}

// Confetti (upgraded: more particles, gravity, rotation)
function launchConfetti(){const c=document.createElement("div");c.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden";
for(let i=0;i<100;i++){const p=document.createElement("div");const colors=["#00f0ff","#ff00e5","#00ff88","#ffe600","#ff6b00","#a855f7","#fff"];
const size=4+Math.random()*10;const shapes=["50%","2px","0"];
p.style.cssText="position:absolute;width:"+size+"px;height:"+size+"px;background:"+colors[Math.floor(Math.random()*colors.length)]+
";left:"+Math.random()*100+"%;top:-10px;border-radius:"+shapes[Math.floor(Math.random()*3)]+
";animation:confetti "+(1.5+Math.random()*2.5)+"s cubic-bezier(.25,.46,.45,.94) "+(Math.random()*0.8)+"s forwards;box-shadow:0 0 6px "+colors[Math.floor(Math.random()*colors.length)];
c.appendChild(p);}document.body.appendChild(c);setTimeout(()=>c.remove(),5000);}

// Toast notification system (kill feed)
const _toastContainer=document.createElement("div");_toastContainer.className="toast-container";document.body.appendChild(_toastContainer);
function showToast(emoji,text,color){
const t=document.createElement("div");t.className="toast";
t.style.borderColor=(color||"#00f0ff")+"40";t.style.boxShadow="0 0 20px "+(color||"#00f0ff")+"15,0 8px 32px rgba(0,0,0,.5)";
t.innerHTML='<span style="font-size:18px">'+emoji+'</span><span style="color:'+(color||"#00f0ff")+'">'+text+'</span>';
_toastContainer.appendChild(t);setTimeout(()=>t.remove(),4200);}

// Matrix rain background
function initMatrix(){const cvs=document.createElement("canvas");cvs.className="matrix-bg";document.body.appendChild(cvs);
const ctx=cvs.getContext("2d");const resize=()=>{cvs.width=window.innerWidth;cvs.height=window.innerHeight};resize();window.addEventListener("resize",resize);
const chars="アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF";
const fontSize=14;let columns;let drops;
const init=()=>{columns=Math.floor(cvs.width/fontSize);drops=Array(columns).fill(1);};init();window.addEventListener("resize",init);
setInterval(()=>{ctx.fillStyle="rgba(10,14,26,0.05)";ctx.fillRect(0,0,cvs.width,cvs.height);ctx.fillStyle="#00f0ff";ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){const t=chars[Math.floor(Math.random()*chars.length)];
ctx.fillStyle=Math.random()>0.98?"#ff00e5":Math.random()>0.95?"#00ff88":"#00f0ff";
ctx.fillText(t,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>cvs.height&&Math.random()>0.975)drops[i]=0;drops[i]++;}},50);}
initMatrix();

// Scanline effect
const _scanline=document.createElement("div");_scanline.className="scanline";document.body.appendChild(_scanline);

// Achievement system
const ACHIEVEMENTS=[
{id:"first_blood",name:"FIRST BLOOD",desc:"Premier prospect contacte",emoji:"🗡️",color:"#ef4444",check:s=>(s.contacted||0)>=1},
{id:"hunter",name:"HUNTER",desc:"50 prospects contactes",emoji:"🏹",color:"#a855f7",check:s=>(s.contacted||0)>=50},
{id:"centurion",name:"CENTURION",desc:"100 prospects contactes",emoji:"⚔️",color:"#ffe600",check:s=>(s.contacted||0)>=100},
{id:"spartan",name:"SPARTAN",desc:"300 prospects contactes",emoji:"🛡️",color:"#ff6b00",check:s=>(s.contacted||0)>=300},
{id:"first_reply",name:"FIRST REPLY",desc:"Premiere reponse",emoji:"💬",color:"#00ff88",check:s=>(s.replied||0)>=1},
{id:"popular",name:"POPULAR",desc:"10 reponses recues",emoji:"🔥",color:"#ffe600",check:s=>(s.replied||0)>=10},
{id:"closer",name:"CLOSER",desc:"Premier deal close",emoji:"🏆",color:"#00ff88",check:s=>(s.converted||0)>=1},
{id:"serial_closer",name:"SERIAL CLOSER",desc:"5 deals closes",emoji:"💎",color:"#ff00e5",check:s=>(s.converted||0)>=5},
{id:"army",name:"ARMY BUILDER",desc:"1000 prospects",emoji:"🏰",color:"#00f0ff",check:s=>(s.total||0)>=1000},
{id:"legion",name:"LEGION",desc:"5000 prospects",emoji:"👑",color:"#ffe600",check:s=>(s.total||0)>=5000},
{id:"email_king",name:"EMAIL KING",desc:"500 emails envoyes",emoji:"📧",color:"#a855f7",check:s=>(s.contacted||0)>=500},
{id:"meeting_master",name:"MEETING MASTER",desc:"10 RDV planifies",emoji:"📅",color:"#00ff88",check:s=>(s.meetings||0)>=10},
];
function getUnlocked(stats){return ACHIEVEMENTS.filter(a=>a.check(stats));}

const PIPELINE=["new","email_sent","replied","meeting","converted"];
const statusOf=id=>STATUSES.find(s=>s.id===id)||STATUSES[0];

// Rank icons per level
const RANK_ICONS=["🔰","⚡","🗡️","👑","💎","🌟"];

// ─── API Helper ──────────────────────────────────────────────────────────────
let TOKEN=localStorage.getItem("crm_token")||"";
const setToken=(t)=>{TOKEN=t;if(t)localStorage.setItem("crm_token",t);else localStorage.removeItem("crm_token");};
const api=async(path,opts={})=>{
  const res=await fetch("/api"+path,{...opts,headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN,...(opts.headers||{})}});
  if(res.status===401&&path!=="/refresh-token"){setToken("");window._onAuthLost&&window._onAuthLost();throw new Error("Session expiree");}
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||"Erreur");
  return data;
};
// Auto-refresh token every 30 min to avoid expiration
setInterval(async()=>{if(!TOKEN)return;try{const r=await api("/refresh-token",{method:"POST"});if(r.token)setToken(r.token);}catch(e){}},30*60*1000);

// ─── Login ───────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const submit=async e=>{
    e.preventDefault();setLoading(true);setErr("");
    try{const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
      const d=await r.json();
      if(d.ok){setToken(d.token);onLogin(d.token);}else setErr(d.error||"Erreur");
    }catch(e){setErr("Connexion impossible");}
    setLoading(false);
  };
  return h("div",{className:"min-h-screen bg-dark flex items-center justify-center p-4",style:{position:"relative",zIndex:1}},
    h("form",{onSubmit:submit,className:"card-dark epic w-full max-w-sm p-8",style:{position:"relative",overflow:"hidden"}},
      // Energy orbs
      h("div",{className:"energy-orb",style:{width:120,height:120,background:"radial-gradient(circle,#00f0ff20,transparent)",top:-30,right:-30}}),
      h("div",{className:"energy-orb",style:{width:80,height:80,background:"radial-gradient(circle,#ff00e520,transparent)",bottom:-20,left:-20,animationDelay:"1.5s"}}),
      h("div",{className:"text-center mb-6",style:{position:"relative"}},
        h("div",{className:"w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 neon-glow",
          style:{background:"linear-gradient(135deg,#00f0ff,#a855f7)",animation:"float 3s ease-in-out infinite, pulse-neon 2s infinite"}},h("span",{className:"text-4xl"},"🎮")),
        h("h1",{className:"text-3xl font-black text-white glitch-text tracking-wider"},"JALUNIA"),
        h("p",{className:"text-sm text-gray-500 mt-1 font-gaming tracking-widest"},"MACHINE A CLOSER"),
        h("div",{className:"flex justify-center gap-1 mt-3"},
          ["#00f0ff","#a855f7","#00ff88","#ffe600","#ff00e5"].map((c,i)=>
            h("div",{key:i,className:"w-2 h-2 rounded-full",style:{backgroundColor:c,boxShadow:"0 0 8px "+c,animation:"float 2s ease-in-out "+(i*0.2)+"s infinite"}})))
      ),
      h("div",{className:"mb-4"},
        h("label",{className:"block text-xs font-bold text-gray-400 mb-1 font-gaming tracking-wider"},"MOT DE PASSE"),
        h("input",{type:"password",value:pw,onChange:e=>setPw(e.target.value),autoFocus:true,
          className:"w-full px-4 py-3 border rounded-xl text-sm focus:outline-none",
          placeholder:"Entrez le mot de passe..."})
      ),
      err?h("div",{className:"text-red-400 text-sm mb-3 flex items-center gap-2"},h("span",null,"💀"),err):null,
      h("button",{type:"submit",disabled:loading||!pw,
        className:"w-full py-3.5 text-white rounded-xl font-black disabled:opacity-40 transition-all font-gaming tracking-wider text-sm",
        style:{background:"linear-gradient(135deg,#00f0ff,#a855f7)",boxShadow:!loading&&pw?"0 0 20px #00f0ff40,0 0 40px #a855f720":"none"}},
        loading?"CHARGEMENT...":"⚡ ENTRER ⚡")
    )
  );
}

// ─── StatusBadge ─────────────────────────────────────────────────────────────
function StatusBadge({sid}){const s=statusOf(sid);return h("span",{className:"inline-flex items-center gap-1 rounded-full font-bold px-2.5 py-1 text-xs",style:{backgroundColor:s.bg,color:s.color,border:"1px solid "+s.color+"40",boxShadow:"0 0 8px "+s.color+"20"}},s.emoji+" "+s.label);}

function KPI({label,value,color,sub,icon}){
  return h("div",{className:"card-dark p-4 transition-all group",style:{position:"relative",overflow:"hidden"}},
    h("div",{className:"energy-orb",style:{width:60,height:60,background:"radial-gradient(circle,"+color+"10,transparent)",top:-15,right:-15,opacity:0,transition:"opacity .3s"}}),
    h("div",{className:"flex items-center justify-between mb-2"},
      h("div",{className:"w-3 h-3 rounded-full",style:{backgroundColor:color,boxShadow:"0 0 10px "+color}}),
      sub?h("span",{className:"text-xs font-bold px-1.5 py-0.5 rounded",style:{backgroundColor:color+"15",color}},sub):null),
    h("div",{className:"text-2xl font-black text-white stat-number"},typeof value==="number"?value.toLocaleString("fr-FR"):value),
    h("div",{className:"text-xs text-gray-500 mt-0.5"},label));
}

// ─── Dashboard ───────────────────────────────────────────────────────────────
function Dashboard({onNav}){
  const[stats,setStats]=useState(null);
  const[analytics,setAnalytics]=useState(null);
  const[onboarding,setOnboarding]=useState(null);
  const[loading,setLoading]=useState(true);
  const[loadErr,setLoadErr]=useState("");
  useEffect(()=>{
    Promise.all([api("/prospects/stats").catch(e=>{setLoadErr(e.message);return null}),api("/analytics/emails").catch(()=>null),api("/onboarding").catch(()=>null)])
      .then(([s,a,o])=>{setStats(s);setAnalytics(a);setOnboarding(o);}).catch(e=>setLoadErr(e.message)).finally(()=>setLoading(false));
  },[]);

  if(loading)return h("div",{className:"text-center py-20 text-gray-500"},"Chargement...");
  if(!stats)return h("div",{className:"text-center py-20"},
    h("div",{className:"text-red-400 mb-2"},"Erreur de chargement"),
    loadErr?h("div",{className:"text-xs text-gray-500"},loadErr):null,
    h("button",{onClick:()=>location.reload(),className:"mt-3 px-4 py-2 border border-gray-700 rounded-lg text-sm text-gray-400 hover:border-neon"},"Recharger"));

  const{total,withEmail,contacted,replied,meetings,converted,statusCounts,typeCounts,villeCounts,emailByType}=stats;
  const xp=calcXP(stats);const lv=getLevel(xp);const xpPct=getXpPct(xp);
  const replyRate=contacted>0?((replied/contacted)*100).toFixed(1)+"%":"0%";
  const convRate=total>0?((converted/total)*100).toFixed(1)+"%":"0%";
  const statusData=STATUSES.map(s=>({...s,count:statusCounts[s.id]||0})).filter(s=>s.count>0);
  const topVilles=Object.entries(villeCounts||{}).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const topTypes=Object.entries(typeCounts||{}).sort((a,b)=>b[1]-a[1]);
  const maxV=topVilles[0]?topVilles[0][1]:1;
  const maxT=topTypes[0]?topTypes[0][1]:1;
  const emailTypes=Object.entries(emailByType||{}).sort((a,b)=>b[1].total-a[1].total).slice(0,10);

  const unlocked=getUnlocked(stats);const locked=ACHIEVEMENTS.filter(a=>!a.check(stats));
  const nextAch=locked[0];

  return h("div",{className:"space-y-6 fade",style:{position:"relative",zIndex:1}},
    // XP Bar - Epic version
    h("div",{className:"card-dark epic p-6",style:{position:"relative",overflow:"hidden"}},
      h("div",{className:"energy-orb",style:{width:150,height:150,background:"radial-gradient(circle,"+lv.color+"15,transparent)",top:-40,right:-40}}),
      h("div",{className:"flex items-center justify-between mb-3",style:{position:"relative"}},
        h("div",{className:"flex items-center gap-4"},
          h("div",{className:"rank-badge",style:{color:lv.color,borderColor:lv.color,boxShadow:"0 0 15px "+lv.color+"40",fontSize:20,width:44,height:44}},
            RANK_ICONS[lv.level-1]||"🔰"),
          h("div",null,
            h("div",{className:"flex items-center gap-2"},
              h("span",{className:"text-xl font-black font-gaming tracking-wider",style:{color:lv.color,textShadow:"0 0 20px "+lv.color+"60"}},lv.name.toUpperCase()),
              h("span",{className:"text-xs px-2 py-0.5 rounded-full font-bold font-gaming",style:{backgroundColor:lv.color+"20",color:lv.color,border:"1px solid "+lv.color+"40"}},"LVL "+lv.level)),
            h("div",{className:"text-xs text-gray-500 mt-0.5"},unlocked.length+"/"+ACHIEVEMENTS.length+" achievements"))),
        h("div",{className:"text-right"},
          h("div",{className:"text-2xl font-black font-gaming",style:{color:lv.color,textShadow:"0 0 15px "+lv.color+"40"}},xp.toLocaleString("fr-FR")),

    api("/prospects/"+prospectId).then(d=>{setP(d);setNotes(d.notes||"");}).catch(()=>{}).finally(()=>setLoading(false));
  },[prospectId]);

    if(!p)return;
    const templates={
      1:{subj:p.email1Sujet||p.nom+" — une question rapide",body:p.email1Corps||"Bonjour,\n\nJe me permets de vous contacter..."},

// --- Import View -------------------------------------------------------------
function ImportView(){
  const[mode,setMode]=useState("paste");
  const[jsonText,setJsonText]=useState("");
  const[importing,setImporting]=useState(false);
  const[result,setResult]=useState(null);
  const[fast,setFast]=useState(true);
  const fileRef=useRef(null);

  const parseJson=txt=>{
    txt=txt.trim();
    // Remove BOM
    if(txt.charCodeAt(0)===0xFEFF)txt=txt.slice(1);
    // Try to fix common issues: trailing comma, missing bracket
    if(!txt.endsWith("]")&&!txt.endsWith("}"))txt+="]";
    try{
      let d=JSON.parse(txt);
      if(Array.isArray(d))return d;
      if(d.prospects&&Array.isArray(d.prospects))return d.prospects;
      if(typeof d==="object")return[d];
      return null;
    }catch(e){
      // Try wrapping in array
      try{return JSON.parse("["+txt+"]");}catch(e2){return null;}
    }
  };

  const CHUNK=200;
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  const sendChunk=(chunk)=>new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open("POST","/api/import"+(fast?"?fast=1":""));
    xhr.setRequestHeader("Content-Type","application/json;charset=UTF-8");
    xhr.setRequestHeader("Authorization","Bearer "+TOKEN);
    xhr.onload=()=>{
      if(xhr.status===401||xhr.status===403){reject(new Error("Session expiree"));return;}
      if(xhr.status===502||xhr.status===503||xhr.status===504){reject(new Error("Serveur occupe ("+xhr.status+")"));return;}
      try{const d=JSON.parse(xhr.responseText);if(xhr.status>=400)reject(new Error(d.error||"Erreur "+xhr.status));else resolve(d);}
      catch(e){reject(new Error("Erreur serveur ("+xhr.status+")"));}
    };
    xhr.onerror=()=>reject(new Error("Erreur reseau"));
    xhr.ontimeout=()=>reject(new Error("Timeout"));
    xhr.timeout=90000;
    xhr.send(JSON.stringify({prospects:chunk}));
  });
  const sendWithRetry=async(chunk,attempt)=>{
    try{return await sendChunk(chunk);}
    catch(e){
      if(attempt<2){await wait(3000);return sendWithRetry(chunk,attempt+1);}
      throw e;
    }
  };
  const importChunked=async(prospects)=>{
    setImporting(true);setResult(null);
    const totals={imported:0,skipped:0,updated:0,errors:0};
    const chunks=[];
    for(let i=0;i<prospects.length;i+=CHUNK)chunks.push(prospects.slice(i,i+CHUNK));
    showToast("⏳","Import de "+prospects.length+" prospects en "+chunks.length+" lots...","#00f0ff");
    for(let i=0;i<chunks.length;i++){
      try{
        const r=await sendWithRetry(chunks[i],0);
        totals.imported+=r.imported||0;totals.skipped+=r.skipped||0;totals.updated+=r.updated||0;totals.errors+=r.errors||0;
        if(r.errorSamples&&r.errorSamples.length>0&&!totals.errorSamples)totals.errorSamples=r.errorSamples;
        showToast("📦","Lot "+(i+1)+"/"+chunks.length+" — "+totals.imported+" importes","#00f0ff");
      }catch(e){showToast("💀","Lot "+(i+1)+" echec: "+e.message,"#ef4444");totals.errors+=chunks[i].length;}
      // Pause 1.5s between chunks to not overwhelm the server
      if(i<chunks.length-1)await wait(1500);
    }
    setResult(totals);
    showToast("✅",totals.imported+" importes au total !","#00ff88");
    if(totals.imported>10)launchConfetti();
    setImporting(false);
  };

  const importJson=async()=>{
    const prospects=parseJson(jsonText);
    if(!prospects||prospects.length===0){showToast("💀","JSON invalide ou vide. Verifiez le format.","#ef4444");return;}
    await importChunked(prospects);
  };

  const importFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const text=await file.text();
      const prospects=parseJson(text);
      if(!prospects||prospects.length===0){showToast("💀","Fichier invalide ou vide","#ef4444");return;}
      await importChunked(prospects);
    }catch(e){showToast("💀",e.message,"#ef4444");}
    if(fileRef.current)fileRef.current.value="";
  };

  return h("div",{className:"max-w-3xl mx-auto fade space-y-6",style:{position:"relative",zIndex:1}},
    h("h2",{className:"text-xl font-bold text-white font-gaming tracking-wider"},"📥 IMPORT"),

    h("div",{className:"flex gap-2 mb-4 flex-wrap items-center"},
      h("button",{onClick:()=>setMode("paste"),className:"px-4 py-2 rounded-lg text-sm font-bold "+(mode==="paste"?"text-neon bg-gray-800 border border-neon/30":"text-gray-500 border border-gray-700")},"Coller du JSON"),
      h("button",{onClick:()=>setMode("file"),className:"px-4 py-2 rounded-lg text-sm font-bold "+(mode==="file"?"text-neon bg-gray-800 border border-neon/30":"text-gray-500 border border-gray-700")},"Uploader un fichier"),
      h("label",{className:"flex items-center gap-2 ml-auto cursor-pointer"},
        h("input",{type:"checkbox",checked:fast,onChange:e=>setFast(e.target.checked),className:"w-4 h-4 accent-cyan-400"}),
        h("span",{className:"text-xs text-gray-400"},"Mode rapide (sans verification doublons)"))),

    mode==="paste"?h("div",{className:"card-dark p-6"},
      h("p",{className:"text-xs text-gray-500 mb-3 p-2 bg-gray-800/50 rounded-lg"},
        "💡 Accepte tous les formats : nom/name/Name, ville/city, email/Email, telephone/phone, site/website, note/rating, avis/reviews, adresse/address, type/category... Le systeme detecte automatiquement les colonnes."),
      h("textarea",{value:jsonText,onChange:e=>setJsonText(e.target.value),rows:12,placeholder:"Collez votre JSON ici...",
        className:"w-full px-3 py-2 border border-gray-700 rounded-lg text-sm font-mono bg-gray-800 text-gray-200 focus:outline-none focus:ring-2 focus:ring-neon/30 resize-none"}),
      h("button",{onClick:importJson,disabled:importing||!jsonText.trim(),
        className:"mt-3 px-6 py-2.5 text-white rounded-lg text-sm font-bold disabled:opacity-40",
        style:{background:"linear-gradient(135deg,#00f0ff,#a855f7)"}},
        importing?"Import...":"⚡ Importer")):null,

    mode==="file"?h("div",{className:"card-dark p-6"},
      h("p",{className:"text-xs text-gray-500 mb-3"},"Formats acceptes: JSON, CSV (colonnes: nom, ville, email, type, telephone, site, note, avis)"),
      h("div",{className:"border-2 border-dashed border-gray-700 rounded-xl p-8 text-center hover:border-neon/40 transition-colors cursor-pointer",
        onClick:()=>fileRef.current&&fileRef.current.click()},
        h("input",{ref:fileRef,type:"file",accept:".json,.csv,.txt",onChange:importFile,className:"hidden"}),
        h("div",{className:"text-4xl mb-3"},"📁"),
        h("div",{className:"text-sm text-gray-400"},importing?"Import en cours...":"Cliquez pour selectionner un fichier"),
        h("div",{className:"text-xs text-gray-600 mt-1"},".json ou .csv"))):null,

    result?h("div",{className:"card-dark p-4"},
      h("div",{className:"grid grid-cols-4 gap-4 text-center"},
        h("div",null,h("div",{className:"text-2xl font-black text-neonGreen"},result.imported),h("div",{className:"text-xs text-gray-500"},"Importes")),
        h("div",null,h("div",{className:"text-2xl font-black text-neonYellow"},result.updated),h("div",{className:"text-xs text-gray-500"},"Mis a jour")),
        h("div",null,h("div",{className:"text-2xl font-black text-gray-500"},result.skipped),h("div",{className:"text-xs text-gray-500"},"Doublons")),
        h("div",null,h("div",{className:"text-2xl font-black text-red-400"},result.errors),h("div",{className:"text-xs text-gray-500"},"Erreurs"))),
      result.errorSamples&&result.errorSamples.length>0?h("div",{className:"mt-4 pt-4 border-t border-gray-800"},
        h("div",{className:"text-xs text-gray-500 mb-2"},"Exemples de lignes en erreur (nom non trouve) :"),
        h("div",{className:"space-y-2"},result.errorSamples.map((s,i)=>
          h("pre",{key:i,className:"text-xs text-red-400 bg-gray-900 p-2 rounded overflow-x-auto"},JSON.stringify(s,null,0))))):null):null
  );
}

// --- Settings ----------------------------------------------------------------
function SettingsView(){
  const[s,setS]=useState({});
  const[loading,setLoading]=useState(true);
  const[saved,setSaved]=useState(false);
  const[checking,setChecking]=useState(false);
  const[inboxResult,setInboxResult]=useState(null);
  const[smtpTest,setSmtpTest]=useState(null);
  const[testingSmtp,setTestingSmtp]=useState(false);
  const[imapTest,setImapTest]=useState(null);
  const[testingImap,setTestingImap]=useState(false);

  useEffect(()=>{api("/settings").then(setS).catch(()=>{}).finally(()=>setLoading(false));},[]);
  const save=async()=>{try{await api("/settings",{method:"POST",body:JSON.stringify(s)});setSaved(true);showToast("✅","Parametres sauvegardes","#00ff88");setTimeout(()=>setSaved(false),2000);}catch(e){showToast("💀",e.message,"#ef4444");}};
  const checkInbox=async()=>{setChecking(true);try{const r=await api("/check-inbox",{method:"POST"});setInboxResult(r);showToast("📥",r.replies+" reponses, "+r.stops+" STOP","#00f0ff");}catch(e){setInboxResult({error:e.message});}setChecking(false);};
  const testSmtp=async()=>{setTestingSmtp(true);setSmtpTest(null);await save();try{const r=await api("/test-smtp",{method:"POST"});setSmtpTest(r);showToast("✅","SMTP OK","#00ff88");}catch(e){setSmtpTest({error:e.message});showToast("💀","SMTP echec","#ef4444");}setTestingSmtp(false);};
  const testImap=async()=>{setTestingImap(true);setImapTest(null);await save();try{const r=await api("/test-imap",{method:"POST"});setImapTest(r);showToast("✅","IMAP OK","#00ff88");}catch(e){setImapTest({error:e.message});showToast("💀","IMAP echec","#ef4444");}setTestingImap(false);};

  if(loading)return h("div",{className:"text-center py-20 text-gray-400"},"Chargement...");

  const Field=({label,k,type})=>h("div",null,
    h("label",{className:"block text-xs font-medium text-gray-500 mb-1"},label),
    h("input",{type:type||"text",value:s[k]||"",onChange:e=>setS({...s,[k]:e.target.value}),
      className:"w-full px-3 py-2 border border-gray-700 rounded-lg text-sm bg-gray-800 text-gray-200 focus:outline-none focus:ring-2 focus:ring-neon/30"}));

  const PRESETS=[
    {name:"Gmail",host:"smtp.gmail.com",port:"587",ihost:"imap.gmail.com",iport:"993"},
    {name:"Outlook",host:"smtp.office365.com",port:"587",ihost:"outlook.office365.com",iport:"993"},
    {name:"OVH",host:"ssl0.ovh.net",port:"587",ihost:"ssl0.ovh.net",iport:"993"},
    {name:"Ionos",host:"smtp.ionos.fr",port:"587",ihost:"imap.ionos.fr",iport:"993"},
  ];
  const applyPreset=p=>{setS({...s,smtp_host:p.host,smtp_port:p.port,imap_host:p.ihost,imap_port:p.iport});showToast("✅","Preset "+p.name+" applique","#00f0ff");};

  return h("div",{className:"max-w-2xl mx-auto fade",style:{position:"relative",zIndex:1}},
    h("h2",{className:"text-xl font-bold text-white mb-6 font-gaming tracking-wider"},"⚙️ CONFIG"),
    h("div",{className:"card-dark p-6 space-y-6"},

      // SMTP Section with presets
      h("div",null,
        h("div",{className:"flex items-center justify-between mb-3"},
          h("h3",{className:"font-semibold text-gray-300"},"📤 Envoi d'emails (SMTP)"),
          h("button",{onClick:testSmtp,disabled:testingSmtp,
            className:"px-3 py-1.5 rounded-lg text-xs font-bold border "+(smtpTest&&smtpTest.ok?"border-neonGreen/40 text-neonGreen":smtpTest&&smtpTest.error?"border-red-500/40 text-red-400":"border-gray-700 text-gray-400 hover:border-neon")},
            testingSmtp?"Test...":(smtpTest?smtpTest.ok?"✅ Connecte":"❌ Echec":"🔌 Tester la connexion"))),
        h("div",{className:"flex gap-2 mb-3"},
          h("span",{className:"text-xs text-gray-600 py-1"},"Remplissage auto :"),
          PRESETS.map(p=>h("button",{key:p.name,onClick:()=>applyPreset(p),
            className:"px-3 py-1 rounded-lg text-xs border border-gray-700 text-gray-400 hover:border-neon hover:text-neon"},p.name))),
        h("p",{className:"text-xs text-gray-600 mb-3 p-2 bg-gray-800/50 rounded-lg"},
          "💡 Pour Gmail : activez la validation en 2 etapes puis creez un \"mot de passe d'application\" dans les parametres Google. Le mot de passe habituel ne marchera pas."),
        h("div",{className:"grid grid-cols-2 gap-4"},
          h(Field,{label:"Serveur SMTP",k:"smtp_host"}),
          h(Field,{label:"Port",k:"smtp_port"}),
          h(Field,{label:"Adresse email",k:"smtp_user"}),
          h(Field,{label:"Mot de passe (ou mot de passe d'appli)",k:"smtp_pass",type:"password"}),
          h(Field,{label:"Email expediteur (si different)",k:"sender_email"}),
          h(Field,{label:"Nom qui apparait dans les emails",k:"sender_name"})),
        smtpTest&&smtpTest.error?h("div",{className:"mt-2 text-xs text-red-400 p-2 bg-red-900/20 rounded"},smtpTest.error):null),

      // IMAP
      h("div",null,
        h("div",{className:"flex items-center justify-between mb-3"},
          h("h3",{className:"font-semibold text-gray-300"},"📥 Reception (IMAP)"),
          h("div",{className:"flex gap-2"},
            h("button",{onClick:testImap,disabled:testingImap,
              className:"px-3 py-1.5 rounded-lg text-xs font-bold border "+(imapTest&&imapTest.ok?"border-neonGreen/40 text-neonGreen":imapTest&&imapTest.error?"border-red-500/40 text-red-400":"border-gray-700 text-gray-400 hover:border-neon")},
              testingImap?"Test...":(imapTest?imapTest.ok?"✅ Connecte":"❌ Echec":"🔌 Tester")),
            h("button",{onClick:checkInbox,disabled:checking,
              className:"px-3 py-1.5 border border-gray-700 rounded-lg text-xs text-gray-400 hover:border-neon"},
              checking?"Verification...":"📬 Verifier inbox"))),
        h("p",{className:"text-xs text-gray-600 mb-3 p-2 bg-gray-800/50 rounded-lg"},
          "💡 Sert a detecter automatiquement les reponses et les demandes de desinscription. Memes identifiants que le SMTP en general."),
        h("div",{className:"grid grid-cols-2 gap-4"},
          h(Field,{label:"Serveur IMAP",k:"imap_host"}),
          h(Field,{label:"Port IMAP",k:"imap_port"}),
          h(Field,{label:"Utilisateur IMAP",k:"imap_user"}),
          h(Field,{label:"Mot de passe IMAP",k:"imap_pass",type:"password"})),
        imapTest&&imapTest.error?h("div",{className:"mt-2 text-xs text-red-400"},imapTest.error):null,
        inboxResult?h("div",{className:"mt-2 text-xs "+(inboxResult.error?"text-red-400":"text-neonGreen")},
          inboxResult.error||"✅ "+inboxResult.replies+" reponses, "+inboxResult.stops+" STOP"):null),

      // Campaign settings
      h("div",null,
        h("h3",{className:"font-semibold text-gray-300 mb-3"},"🚀 Campagne"),
        h("div",{className:"grid grid-cols-3 gap-4"},
          h(Field,{label:"Max d'emails par jour",k:"daily_limit"}),
          h(Field,{label:"Jours avant la relance (email 2)",k:"delay_email2"}),
          h(Field,{label:"Jours avant le dernier email (email 3)",k:"delay_email3"}),
          h(Field,{label:"Heure de debut (heure France)",k:"send_hour_start"}),
          h(Field,{label:"Heure de fin (heure France)",k:"send_hour_end"}),
          h(Field,{label:"Adresse du CRM (pour le tracking)",k:"base_url"}))),

      // Warmup
      h("div",null,
        h("h3",{className:"font-semibold text-gray-300 mb-3"},"🔥 Warmup progressif"),
        h("p",{className:"text-xs text-gray-600 mb-3 p-2 bg-gray-800/50 rounded-lg"},
          "💡 Le warmup augmente progressivement le volume d'envoi pour eviter d'etre flagge comme spam. Jour 1-3: 5/jour, Jour 4-7: 10/jour, Jour 8-14: 20/jour, puis limite normale."),
        h("label",{className:"flex items-center gap-3 cursor-pointer"},
          h("input",{type:"checkbox",checked:s.warmup_enabled==="true",
            onChange:e=>setS({...s,warmup_enabled:e.target.checked?"true":"false",warmup_start_date:s.warmup_start_date||new Date().toISOString().split("T")[0]}),
            className:"w-5 h-5 accent-cyan-400"}),
          h("span",{className:"text-sm text-gray-300"},"Activer le warmup progressif"),
          s.warmup_enabled==="true"?h("span",{className:"text-xs text-neon px-2 py-0.5 bg-neon/10 rounded-full"},"Actif depuis le "+(s.warmup_start_date||"aujourd'hui")):null)),

      // Blacklist
      h("div",null,
        h("h3",{className:"font-semibold text-gray-300 mb-3"},"🚫 Domaines exclus (blacklist)"),
        h("p",{className:"text-xs text-gray-600 mb-3 p-2 bg-gray-800/50 rounded-lg"},
          "💡 Les emails vers ces domaines ne seront jamais envoyes. Separez par des virgules. Ex: votredomaine.com, concurrent.fr"),
        h("input",{value:s.domain_blacklist||"",onChange:e=>setS({...s,domain_blacklist:e.target.value}),placeholder:"exemple.com, concurrent.fr, spam.org",
          className:"w-full px-3 py-2 border border-gray-700 rounded-lg text-sm bg-gray-800 text-gray-200 focus:outline-none focus:ring-2 focus:ring-neon/30"})),

      // Google API
      h("div",null,
        h("h3",{className:"font-semibold text-gray-300 mb-3"},"🔑 API Google Places"),
        h("p",{className:"text-xs text-gray-600 mb-3 p-2 bg-gray-800/50 rounded-lg"},
          "💡 Necessaire uniquement pour le scraping. Creez une cle sur console.cloud.google.com > API & Services > Credentials."),
        h(Field,{label:"Cle API Google Places",k:"google_places_api_key"})),

      // Save button
      h("div",{className:"flex items-center gap-3 pt-2"},
        h("button",{onClick:save,className:"px-6 py-2.5 text-white rounded-lg text-sm font-bold font-gaming tracking-wider",
          style:{background:"linear-gradient(135deg,#00f0ff,#a855f7)"}},saved?"✅ SAUVEGARDE":"💾 SAUVEGARDER")))
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App(){
  const[auth,setAuth]=useState(!!TOKEN);
  const[view,setView]=useState("dashboard");
  const[selectedId,setSelectedId]=useState(null);

  useEffect(()=>{window._onAuthLost=()=>setAuth(false);return()=>{window._onAuthLost=null;};},[]);

  if(!auth)return h(Login,{onLogin:t=>{setToken(t);setAuth(true);}});

  const navs=[["dashboard","📊","Dashboard"],["table","👥","Prospects"],["scraping","🔍","Scraping"],["import","📥","Import"],["campaign","🚀","Campagne"],["settings","⚙️","Config"]];

  return h("div",{className:"min-h-screen bg-dark",style:{position:"relative",zIndex:1}},
    h("header",{className:"bg-card/90 border-b border-gray-800 sticky top-0 z-40",style:{backdropFilter:"blur(12px)"}},
      h("div",{className:"max-w-7xl mx-auto px-6 py-3 flex items-center justify-between"},
        h("div",{className:"flex items-center gap-3"},
          h("div",{className:"w-9 h-9 rounded-lg flex items-center justify-center neon-glow",
            style:{background:"linear-gradient(135deg,#00f0ff,#a855f7)"}},h("span",{className:"text-white text-lg"},"🎮")),
          h("div",null,h("h1",{className:"text-lg font-black text-white leading-none font-gaming tracking-wider glitch-text"},"JALUNIA"),h("p",{className:"text-xs text-gray-500 font-gaming tracking-widest"},"MACHINE A CLOSER"))),
        h("nav",{className:"flex items-center gap-1 bg-gray-900/80 rounded-xl p-1",style:{border:"1px solid #1e293b"}},
          navs.map(([id,ico,lbl])=>h("button",{key:id,onClick:()=>{setView(id);setSelectedId(null);},
            className:"flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all "+
            (view===id||(view==="detail"&&id==="table")?"text-neon bg-gray-800 font-gaming":"text-gray-500 hover:text-gray-300")},
            ico+" "+lbl))),
        h("button",{onClick:()=>{setToken("");setAuth(false);},className:"text-sm text-gray-600 hover:text-red-400 font-gaming tracking-wider"},"⏻ QUIT"))),
    h("main",{className:"max-w-7xl mx-auto px-6 py-6"},
      view==="dashboard"?h(Dashboard,{onNav:v=>{setView(v);setSelectedId(null);}}):null,
      view==="table"?h(ProspectTable,{onSelect:p=>{setSelectedId(p.id);setView("detail");}}):null,
      view==="detail"&&selectedId?h(ProspectDetail,{prospectId:selectedId,onBack:()=>{setView("table");setSelectedId(null);}}):null,
      view==="scraping"?h(ScrapingView):null,
      view==="import"?h(ImportView):null,
      view==="campaign"?h(CampaignView):null,
      view==="settings"?h(SettingsView):null)
  );
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>
