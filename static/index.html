<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalunia CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9fafb}
.fade{animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const h=React.createElement;
const{useState,useEffect,useMemo,useCallback,useRef}=React;

const STATUSES=[
{id:"new",label:"À traiter",emoji:"🆕",color:"#3B82F6",bg:"#EFF6FF"},
{id:"email_sent",label:"Email envoyé",emoji:"📤",color:"#8B5CF6",bg:"#F5F3FF"},
{id:"linkedin",label:"LinkedIn envoyé",emoji:"🔗",color:"#06B6D4",bg:"#ECFEFF"},
{id:"both_sent",label:"Les deux envoyés",emoji:"📧",color:"#6366F1",bg:"#EEF2FF"},
{id:"replied",label:"Réponse reçue",emoji:"↩️",color:"#F59E0B",bg:"#FFFBEB"},
{id:"meeting",label:"RDV planifié",emoji:"📅",color:"#10B981",bg:"#ECFDF5"},
{id:"converted",label:"Client converti",emoji:"✅",color:"#059669",bg:"#D1FAE5"},
{id:"not_interested",label:"Pas intéressé",emoji:"❌",color:"#EF4444",bg:"#FEF2F2"},
{id:"follow_up",label:"À recontacter",emoji:"💤",color:"#6B7280",bg:"#F3F4F6"},
{id:"unsubscribed",label:"Désabonné",emoji:"🚫",color:"#9CA3AF",bg:"#F9FAFB"},
];
const PIPELINE=["new","email_sent","replied","meeting","converted"];
const statusOf=id=>STATUSES.find(s=>s.id===id)||STATUSES[0];

// ─── API Helper ──────────────────────────────────────────────────────────────
let TOKEN=localStorage.getItem("crm_token")||"";
const setToken=(t)=>{TOKEN=t;if(t)localStorage.setItem("crm_token",t);else localStorage.removeItem("crm_token");};
const api=async(path,opts={})=>{
  const res=await fetch("/api"+path,{...opts,headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN,...(opts.headers||{})}});
  if(res.status===401){setToken("");throw new Error("Non autorisé");}
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||"Erreur");
  return data;
};

// ─── Login ───────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const submit=async e=>{
    e.preventDefault();setLoading(true);setErr("");
    try{const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
      const d=await r.json();
      if(d.ok){setToken(d.token);onLogin(d.token);}else setErr(d.error||"Erreur");
    }catch(e){setErr("Connexion impossible");}
    setLoading(false);
  };
  return h("div",{className:"min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4"},
    h("form",{onSubmit:submit,className:"bg-white rounded-2xl shadow-xl w-full max-w-sm p-8"},
      h("div",{className:"text-center mb-6"},
        h("div",{className:"w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center mx-auto mb-3"},h("span",{className:"text-white text-2xl font-bold"},"J")),
        h("h1",{className:"text-xl font-bold text-gray-900"},"Jalunia CRM"),
        h("p",{className:"text-sm text-gray-500 mt-1"},"Prospection B2B — Hébergements France")
      ),
      h("div",{className:"mb-4"},
        h("label",{className:"block text-sm font-medium text-gray-700 mb-1"},"Mot de passe"),
        h("input",{type:"password",value:pw,onChange:e=>setPw(e.target.value),autoFocus:true,
          className:"w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300",
          placeholder:"Entrez le mot de passe..."})
      ),
      err?h("div",{className:"text-red-500 text-sm mb-3"},err):null,
      h("button",{type:"submit",disabled:loading||!pw,className:"w-full py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 disabled:opacity-40 transition-all"},
        loading?"Connexion...":"Se connecter")
    )
  );
}

// ─── StatusBadge ─────────────────────────────────────────────────────────────
function StatusBadge({sid}){const s=statusOf(sid);return h("span",{className:"inline-flex items-center gap-1 rounded-full font-medium px-2 py-0.5 text-xs",style:{backgroundColor:s.bg,color:s.color,border:"1px solid "+s.color+"20"}},s.emoji+" "+s.label);}

// ─── KPI ─────────────────────────────────────────────────────────────────────
function KPI({label,value,color,sub}){
  return h("div",{className:"bg-white rounded-xl border border-gray-100 p-4 hover:shadow-md transition-shadow"},
    h("div",{className:"flex items-center justify-between mb-2"},
      h("div",{className:"w-5 h-5 rounded",style:{backgroundColor:color}}),
      sub?h("span",{className:"text-xs font-medium px-1.5 py-0.5 rounded",style:{backgroundColor:color+"15",color}},sub):null),
    h("div",{className:"text-2xl font-bold text-gray-900"},typeof value==="number"?value.toLocaleString("fr-FR"):value),
    h("div",{className:"text-xs text-gray-500 mt-0.5"},label));
}

// ─── Dashboard ───────────────────────────────────────────────────────────────
function Dashboard(){
  const[stats,setStats]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{api("/prospects/stats").then(setStats).catch(()=>{}).finally(()=>setLoading(false));},[]);

  if(loading)return h("div",{className:"text-center py-20 text-gray-400"},"Chargement...");
  if(!stats)return h("div",{className:"text-center py-20 text-red-400"},"Erreur de chargement");

  const{total,withEmail,contacted,replied,meetings,converted,statusCounts,typeCounts,villeCounts,emailByType}=stats;
  const replyRate=contacted>0?((replied/contacted)*100).toFixed(1)+"%":"0%";
  const convRate=total>0?((converted/total)*100).toFixed(1)+"%":"0%";
  const statusData=STATUSES.map(s=>({...s,count:statusCounts[s.id]||0})).filter(s=>s.count>0);
  const topVilles=Object.entries(villeCounts||{}).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const topTypes=Object.entries(typeCounts||{}).sort((a,b)=>b[1]-a[1]);
  const maxV=topVilles[0]?topVilles[0][1]:1;
  const maxT=topTypes[0]?topTypes[0][1]:1;
  const emailTypes=Object.entries(emailByType||{}).sort((a,b)=>b[1].total-a[1].total).slice(0,10);

  return h("div",{className:"space-y-6 fade"},
    h("div",{className:"grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"},
      h(KPI,{label:"Total",value:total,color:"#3B82F6"}),
      h(KPI,{label:"Avec email",value:withEmail,color:"#8B5CF6",sub:total>0?Math.round(withEmail/total*100)+"%":null}),
      h(KPI,{label:"Contactés",value:contacted,color:"#06B6D4"}),
      h(KPI,{label:"Réponses",value:replied,color:"#F59E0B",sub:replyRate}),
      h(KPI,{label:"RDV",value:meetings,color:"#10B981"}),
      h(KPI,{label:"Convertis",value:converted,color:"#059669",sub:convRate})),
    h("div",{className:"grid grid-cols-1 lg:grid-cols-2 gap-6"},
      h("div",{className:"bg-white rounded-xl border border-gray-100 p-6"},
        h("h3",{className:"font-semibold text-gray-900 mb-4"},"🎯 Pipeline"),
        h("div",{className:"space-y-3"},statusData.map(s=>h("div",{key:s.id},
          h("div",{className:"flex justify-between text-sm mb-1"},h("span",null,s.emoji+" "+s.label),h("span",{className:"text-gray-500 text-xs"},s.count.toLocaleString("fr-FR"))),
          h("div",{className:"w-full bg-gray-100 rounded-full h-2.5"},h("div",{className:"h-2.5 rounded-full",style:{width:Math.max(1,s.count/total*100)+"%",backgroundColor:s.color}})))))),
      h("div",{className:"bg-white rounded-xl border border-gray-100 p-6"},
        h("h3",{className:"font-semibold text-gray-900 mb-4"},"📍 Top villes"),
        h("div",{className:"space-y-2"},topVilles.map(([v,c])=>h("div",{key:v,className:"flex items-center gap-3"},
          h("span",{className:"text-xs text-gray-600 w-28 truncate text-right"},v),
          h("div",{className:"flex-1 bg-gray-100 rounded-full h-2"},h("div",{className:"h-2 rounded-full bg-indigo-500",style:{width:Math.max(2,c/maxV*100)+"%"}})),
          h("span",{className:"text-xs text-gray-500 w-10 text-right"},c))))),
      h("div",{className:"bg-white rounded-xl border border-gray-100 p-6"},
        h("h3",{className:"font-semibold text-gray-900 mb-4"},"🏨 Par type"),
        h("div",{className:"space-y-2"},topTypes.slice(0,12).map(([t,c])=>h("div",{key:t,className:"flex items-center gap-3"},
          h("span",{className:"text-xs text-gray-600 w-40 truncate text-right"},t),
          h("div",{className:"flex-1 bg-gray-100 rounded-full h-2"},h("div",{className:"h-2 rounded-full bg-blue-500",style:{width:Math.max(2,c/maxT*100)+"%"}})),
          h("span",{className:"text-xs text-gray-500 w-12 text-right"},c.toLocaleString("fr-FR")))))),
      h("div",{className:"bg-white rounded-xl border border-gray-100 p-6"},
        h("h3",{className:"font-semibold text-gray-900 mb-4"},"📧 Couverture email"),
        h("div",{className:"space-y-3"},emailTypes.map(([t,d])=>h("div",{key:t},
          h("div",{className:"flex justify-between text-xs mb-1"},h("span",{className:"text-gray-700 truncate"},t),h("span",{className:"text-gray-500"},d.withEmail+"/"+d.total+" ("+d.pct+"%)")),
          h("div",{className:"w-full bg-gray-100 rounded-full h-2"},h("div",{className:"bg-purple-500 h-2 rounded-full",style:{width:Math.max(1,d.pct)+"%"}}))))))
    )
  );
}

// ─── Prospect Table ──────────────────────────────────────────────────────────
function ProspectTable({onSelect}){
  const[data,setData]=useState({prospects:[],total:0,pages:0});
  const[page,setPage]=useState(1);
  const[search,setSearch]=useState("");
  const[fStatus,setFStatus]=useState("");
  const[fType,setFType]=useState("");
  const[fVille,setFVille]=useState("");
  const[fEmail,setFEmail]=useState("");
  const[filters,setFilters]=useState({types:[],villes:[]});
  const[loading,setLoading]=useState(true);
  const searchTimeout=useRef(null);

  const load=useCallback(()=>{
    setLoading(true);
    const params=new URLSearchParams({page,per_page:50});
    if(search)params.set("search",search);
    if(fStatus)params.set("status",fStatus);
    if(fType)params.set("type",fType);
    if(fVille)params.set("ville",fVille);
    if(fEmail)params.set("has_email",fEmail);
    api("/prospects?"+params).then(setData).catch(()=>{}).finally(()=>setLoading(false));
  },[page,search,fStatus,fType,fVille,fEmail]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{api("/filters").then(setFilters).catch(()=>{});},[]);

  const handleSearch=v=>{clearTimeout(searchTimeout.current);searchTimeout.current=setTimeout(()=>{setSearch(v);setPage(1);},300);};

  return h("div",{className:"fade"},
    h("div",{className:"flex flex-wrap items-center gap-3 mb-6"},
      h("div",{className:"relative flex-1",style:{minWidth:250}},
        h("span",{className:"absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"},"🔍"),
        h("input",{defaultValue:search,onChange:e=>handleSearch(e.target.value),placeholder:"Rechercher...",
          className:"w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-200"})),
      h("select",{value:fStatus,onChange:e=>{setFStatus(e.target.value);setPage(1);},className:"px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white"},
        h("option",{value:""},"Tous statuts"),STATUSES.map(s=>h("option",{key:s.id,value:s.id},s.emoji+" "+s.label))),
      h("select",{value:fType,onChange:e=>{setFType(e.target.value);setPage(1);},className:"px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white"},
        h("option",{value:""},"Tous types"),filters.types.map(t=>h("option",{key:t,value:t},t))),
      h("select",{value:fVille,onChange:e=>{setFVille(e.target.value);setPage(1);},className:"px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white"},
        h("option",{value:""},"Toutes villes"),filters.villes.map(v=>h("option",{key:v,value:v},v))),
      h("select",{value:fEmail,onChange:e=>{setFEmail(e.target.value);setPage(1);},className:"px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white"},
        h("option",{value:""},"Email: tous"),h("option",{value:"with"},"Avec email"),h("option",{value:"without"},"Sans email")),
      h("span",{className:"text-sm text-gray-400 ml-auto"},data.total.toLocaleString("fr-FR")+" prospects")),
    loading?h("div",{className:"text-center py-12 text-gray-400"},"Chargement..."):
    h("div",null,
      h("div",{className:"overflow-x-auto rounded-xl border border-gray-200"},
        h("table",{className:"min-w-full divide-y divide-gray-200"},
          h("thead",{className:"bg-gray-50"},h("tr",null,
            ["Établissement","Type","Ville","Statut","Email","Note",""].map(col=>
              h("th",{key:col,className:"px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase"},col)))),
          h("tbody",{className:"bg-white divide-y divide-gray-100"},
            data.prospects.map(p=>h("tr",{key:p.id,className:"hover:bg-blue-50/50 cursor-pointer",onClick:()=>onSelect(p)},
              h("td",{className:"px-4 py-3"},h("div",{className:"font-medium text-sm text-gray-900 truncate",style:{maxWidth:280}},p.nom),h("div",{className:"text-xs text-gray-400"},p.region)),
              h("td",{className:"px-4 py-3"},h("span",{className:"text-xs px-2 py-1 bg-gray-100 rounded-full"},p.type)),
              h("td",{className:"px-4 py-3 text-sm text-gray-600"},p.ville),
              h("td",{className:"px-4 py-3"},h(StatusBadge,{sid:p.status})),
              h("td",{className:"px-4 py-3 text-xs"},p.email?h("span",{className:"text-blue-600 truncate block",style:{maxWidth:180}},p.email):h("span",{className:"text-gray-300"},"—")),
              h("td",{className:"px-4 py-3"},p.note?h("span",{className:"text-sm"},"⭐ "+p.note):null),
              h("td",{className:"px-4 py-3 text-gray-300"},"›")))))),
      data.pages>1?h("div",{className:"flex items-center justify-center gap-2 mt-4"},
        h("button",{onClick:()=>setPage(Math.max(1,page-1)),disabled:page<=1,className:"px-3 py-1.5 border rounded-lg text-sm disabled:opacity-30"},"‹ Préc"),
        h("span",{className:"text-sm text-gray-500"},"Page "+page+"/"+data.pages),
        h("button",{onClick:()=>setPage(Math.min(data.pages,page+1)),disabled:page>=data.pages,className:"px-3 py-1.5 border rounded-lg text-sm disabled:opacity-30"},"Suiv ›")):null
    )
  );
}

// ─── Prospect Detail ─────────────────────────────────────────────────────────
function ProspectDetail({prospectId,onBack,onRefresh}){
  const[p,setP]=useState(null);
  const[loading,setLoading]=useState(true);
  const[showEmail,setShowEmail]=useState(false);
  const[emailNum,setEmailNum]=useState(1);
  const[subj,setSubj]=useState("");
  const[body,setBody]=useState("");
  const[sending,setSending]=useState(false);
  const[sent,setSent]=useState(false);
  const[notes,setNotes]=useState("");
  const[saveMsg,setSaveMsg]=useState("");

  useEffect(()=>{
    api("/prospects/"+prospectId).then(d=>{setP(d);setNotes(d.notes||"");}).catch(()=>{}).finally(()=>setLoading(false));
  },[prospectId]);

  useEffect(()=>{
    if(!p)return;
    const templates={
      1:{subj:p.email1Sujet||p.nom+" — une question rapide",body:p.email1Corps||"Bonjour,\n\nJe me permets de vous contacter..."},
      2:{subj:p.email2Sujet||"Re : Une idée pour "+p.nom,body:p.email2Corps||"Bonjour,\n\nJe reviens vers vous..."},
      3:{subj:p.email3Sujet||"Dernier message — "+p.nom,body:p.email3Corps||"Bonjour,\n\nDernier message de ma part..."},
    };
    const t=templates[emailNum]||templates[1];
    setSubj(t.subj);setBody(t.body);setSent(false);
  },[emailNum,p]);

  const save=async(field,value)=>{
    try{const updated=await api("/prospects/"+prospectId,{method:"PATCH",body:JSON.stringify({[field]:value})});setP(updated);setSaveMsg("✅");setTimeout(()=>setSaveMsg(""),1500);}catch(e){}
  };

  const sendEmail=async()=>{
    setSending(true);
    try{await api("/send-email",{method:"POST",body:JSON.stringify({prospectId:p.id,subject:subj,body,emailNum})});setSent(true);
      const updated=await api("/prospects/"+prospectId);setP(updated);
    }catch(e){alert(e.message);}
    setSending(false);
  };

  if(loading)return h("div",{className:"text-center py-20 text-gray-400"},"Chargement...");
  if(!p)return h("div",{className:"text-center py-20 text-red-400"},"Prospect introuvable");

  return h("div",{className:"max-w-4xl mx-auto fade"},
    h("button",{onClick:onBack,className:"text-sm text-gray-500 hover:text-gray-700 mb-4"},"← Retour"),
    h("div",{className:"bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden"},
      h("div",{className:"bg-gradient-to-r from-gray-50 to-white px-8 py-6 border-b border-gray-100"},
        h("div",{className:"flex items-start justify-between"},
          h("div",null,
            h("h2",{className:"text-2xl font-bold text-gray-900"},p.nom),
            h("div",{className:"flex items-center gap-4 mt-2 text-sm text-gray-500"},
              h("span",null,"📍 "+p.ville+(p.region&&p.region!==p.ville?", "+p.region:"")),
              h("span",{className:"px-2 py-0.5 bg-gray-100 rounded-full text-xs"},p.type),
              p.note?h("span",null,"⭐ "+p.note+" ("+p.avis+" avis)"):null)),
          h("div",{className:"flex items-center gap-2"},
            saveMsg?h("span",{className:"text-green-500 text-sm"},saveMsg):null,
            h("select",{value:p.status,onChange:e=>save("status",e.target.value),
              className:"text-sm border border-gray-200 rounded-lg px-2 py-1.5 bg-white"},
              STATUSES.map(s=>h("option",{key:s.id,value:s.id},s.emoji+" "+s.label)))))),
      h("div",{className:"p-8 grid grid-cols-2 gap-8"},
        h("div",{className:"space-y-4"},
          h("h3",{className:"font-semibold text-gray-700 text-sm uppercase"},"📋 Informations"),
          [["📧","Email","email"],["📞","Téléphone","telephone"],["🌐","Site web","site"]].map(([ico,lbl,fld])=>
            h("div",{key:fld,className:"flex items-center gap-3"},h("span",null,ico),
              h("div",{className:"flex-1"},h("div",{className:"text-xs text-gray-400"},lbl),
                h("input",{value:p[fld]||"",onChange:e=>setP({...p,[fld]:e.target.value}),
                  onBlur:e=>save(fld,e.target.value),placeholder:"Ajouter...",
                  className:"text-sm text-gray-900 bg-transparent border-b border-transparent hover:border-gray-200 focus:border-blue-400 focus:outline-none w-full py-0.5"})))),
          p.adresse?h("div",{className:"text-xs text-gray-400"},p.adresse):null,
          p.emailLogs&&p.emailLogs.length>0?h("div",{className:"pt-3"},
            h("h4",{className:"text-xs font-semibold text-gray-500 uppercase mb-2"},"📨 Historique emails"),
            h("div",{className:"space-y-1"},p.emailLogs.map(l=>
              h("div",{key:l.id,className:"flex items-center gap-2 text-xs py-1 border-b border-gray-50"},
                h("span",{className:l.status==="replied"?"text-green-600":"text-gray-500"},l.status==="replied"?"↩️":"📤"),
                h("span",{className:"text-gray-600 truncate flex-1"},l.subject),
                h("span",{className:"text-gray-400"},new Date(l.sentAt).toLocaleDateString("fr-FR")))))):null),
        h("div",{className:"space-y-4"},
          h("h3",{className:"font-semibold text-gray-700 text-sm uppercase"},"📝 Notes"),
          h("textarea",{value:notes,onChange:e=>setNotes(e.target.value),onBlur:()=>save("notes",notes),
            placeholder:"Ajouter des notes...",rows:4,
            className:"w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 resize-none"}),
          h("h3",{className:"font-semibold text-gray-700 text-sm uppercase mt-4"},"⚡ Actions"),
          h("div",{className:"flex flex-wrap gap-2"},
            h("button",{onClick:()=>{setShowEmail(true);setEmailNum(Math.min((p.emailsSent||0)+1,3));},
              className:"px-4 py-2 bg-blue-50 text-blue-700 rounded-lg text-sm font-medium hover:bg-blue-100"},"✉️ Envoyer email"),
            h("button",{onClick:()=>save("status","meeting"),className:"px-4 py-2 bg-green-50 text-green-700 rounded-lg text-sm font-medium hover:bg-green-100"},"📅 RDV"),
            p.site?h("a",{href:p.site,target:"_blank",rel:"noopener",className:"px-4 py-2 bg-gray-50 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-100"},"🌐 Site"):null)))),
    showEmail?h("div",{className:"bg-white rounded-2xl border border-gray-200 shadow-lg overflow-hidden mt-6 fade"},
      h("div",{className:"bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-4 flex items-center justify-between"},
        h("span",{className:"font-semibold text-white"},"✉️ Envoyer un email"),
        h("button",{onClick:()=>setShowEmail(false),className:"text-white/70 hover:text-white text-xl"},"×")),
      h("div",{className:"p-6"},
        h("div",{className:"flex gap-2 mb-4"},[1,2,3].map(n=>
          h("button",{key:n,onClick:()=>setEmailNum(n),className:"px-4 py-2 rounded-lg text-sm font-medium "+(emailNum===n?"bg-blue-100 text-blue-700 ring-2 ring-blue-200":"bg-gray-100 text-gray-600 hover:bg-gray-200")},
            "Email "+n+(n===1?" (Intro)":n===2?" (Relance)":" (Dernier)")))),
        h("div",{className:"mb-3 px-3 py-2 bg-gray-50 rounded-lg text-sm"},h("strong",null,p.nom)," — ",h("span",{className:"text-blue-600"},p.email||"pas d'email")),
        h("div",{className:"mb-3"},h("label",{className:"block text-xs text-gray-500 mb-1"},"Objet"),
          h("input",{value:subj,onChange:e=>setSubj(e.target.value),className:"w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"})),
        h("div",{className:"mb-4"},h("label",{className:"block text-xs text-gray-500 mb-1"},"Message"),
          h("textarea",{value:body,onChange:e=>setBody(e.target.value),rows:10,className:"w-full px-3 py-2 border border-gray-200 rounded-lg text-sm font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-blue-200 resize-none"})),
        h("div",{className:"flex items-center justify-between"},
          h("span",{className:"text-xs text-gray-400"},p.email?"Prêt":"⚠️ Pas d'email"),
          sent?h("span",{className:"text-green-600 font-medium"},"✅ Envoyé !"):
          h("button",{onClick:sendEmail,disabled:!p.email||sending,className:"px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-40"},sending?"Envoi...":"📤 Envoyer")))):null
  );
}

// ─── Settings ────────────────────────────────────────────────────────────────
function SettingsView(){
  const[s,setS]=useState({});
  const[loading,setLoading]=useState(true);
  const[saved,setSaved]=useState(false);
  const[checking,setChecking]=useState(false);
  const[inboxResult,setInboxResult]=useState(null);

  useEffect(()=>{api("/settings").then(setS).catch(()=>{}).finally(()=>setLoading(false));},[]);
  const save=async()=>{try{await api("/settings",{method:"POST",body:JSON.stringify(s)});setSaved(true);setTimeout(()=>setSaved(false),2000);}catch(e){alert(e.message);}};
  const checkInbox=async()=>{setChecking(true);try{const r=await api("/check-inbox",{method:"POST"});setInboxResult(r);}catch(e){setInboxResult({error:e.message});}setChecking(false);};

  if(loading)return h("div",{className:"text-center py-20 text-gray-400"},"Chargement...");

  const Field=({label,k,type})=>h("div",null,
    h("label",{className:"block text-xs font-medium text-gray-500 mb-1"},label),
    h("input",{type:type||"text",value:s[k]||"",onChange:e=>setS({...s,[k]:e.target.value}),
      className:"w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"}));

  return h("div",{className:"max-w-2xl mx-auto fade"},
    h("h2",{className:"text-xl font-bold text-gray-900 mb-6"},"⚙️ Paramètres"),
    h("div",{className:"bg-white rounded-2xl border border-gray-200 p-6 space-y-6"},
      h("div",null,
        h("h3",{className:"font-semibold text-gray-800 mb-3"},"📤 Envoi d'emails (SMTP)"),
        h("div",{className:"grid grid-cols-2 gap-4"},
          h(Field,{label:"Serveur SMTP",k:"smtp_host"}),
          h(Field,{label:"Port",k:"smtp_port"}),
          h(Field,{label:"Utilisateur",k:"smtp_user"}),
          h(Field,{label:"Mot de passe",k:"smtp_pass",type:"password"}),
          h(Field,{label:"Email expéditeur",k:"sender_email"}),
          h(Field,{label:"Nom expéditeur",k:"sender_name"}))),
      h("div",null,
        h("h3",{className:"font-semibold text-gray-800 mb-3"},"📥 Réception (IMAP)"),
        h("div",{className:"grid grid-cols-2 gap-4"},
          h(Field,{label:"Serveur IMAP",k:"imap_host"}),
          h(Field,{label:"Port IMAP",k:"imap_port"}),
          h(Field,{label:"Utilisateur IMAP",k:"imap_user"}),
          h(Field,{label:"Mot de passe IMAP",k:"imap_pass",type:"password"}))),
      h("div",{className:"flex items-center gap-3"},
        h("button",{onClick:save,className:"px-6 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700"},saved?"✅ Sauvegardé":"Sauvegarder"),
        h("button",{onClick:checkInbox,disabled:checking,className:"px-4 py-2.5 border border-gray-200 rounded-lg text-sm hover:bg-gray-50"},
          checking?"Vérification...":"📥 Vérifier la boîte mail"),
        inboxResult?h("span",{className:"text-sm "+(inboxResult.error?"text-red-500":"text-green-600")},
          inboxResult.error||(""+inboxResult.replies+" réponses, "+inboxResult.stops+" STOP")):null))
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App(){
  const[auth,setAuth]=useState(!!TOKEN);
  const[view,setView]=useState("dashboard");
  const[selectedId,setSelectedId]=useState(null);

  if(!auth)return h(Login,{onLogin:t=>{setToken(t);setAuth(true);}});

  const navs=[["dashboard","📊","Dashboard"],["table","👥","Prospects"],["settings","⚙️","Paramètres"]];

  return h("div",{className:"min-h-screen bg-gray-50"},
    h("header",{className:"bg-white border-b border-gray-200 sticky top-0 z-40"},
      h("div",{className:"max-w-7xl mx-auto px-6 py-3 flex items-center justify-between"},
        h("div",{className:"flex items-center gap-3"},
          h("div",{className:"w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-lg flex items-center justify-center"},h("span",{className:"text-white text-sm font-bold"},"J")),
          h("div",null,h("h1",{className:"text-lg font-bold text-gray-900 leading-none"},"Jalunia CRM"),h("p",{className:"text-xs text-gray-400"},"Prospection B2B"))),
        h("nav",{className:"flex items-center gap-1 bg-gray-100 rounded-lg p-1"},
          navs.map(([id,ico,lbl])=>h("button",{key:id,onClick:()=>{setView(id);setSelectedId(null);},
            className:"flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all "+(view===id||(view==="detail"&&id==="table")?"bg-white text-blue-600 shadow-sm":"text-gray-500 hover:text-gray-700")},ico+" "+lbl))),
        h("button",{onClick:()=>{setToken("");setAuth(false);},className:"text-sm text-gray-400 hover:text-gray-600"},"Déconnexion"))),
    h("main",{className:"max-w-7xl mx-auto px-6 py-6"},
      view==="dashboard"?h(Dashboard):null,
      view==="table"?h(ProspectTable,{onSelect:p=>{setSelectedId(p.id);setView("detail");}}):null,
      view==="detail"&&selectedId?h(ProspectDetail,{prospectId:selectedId,onBack:()=>{setView("table");setSelectedId(null);}}):null,
      view==="settings"?h(SettingsView):null)
  );
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>
</body>
</html>
