databases:
  - name: jalunia-crm-db
    plan: free
    databaseName: jalunia_crm
    user: jalunia

services:
  - type: web
    name: jalunia-crm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: CRM_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: jalunia-crm-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
